version: '3.8'

services:
  postgres:
    image: postgis/postgis
    ports:
      - 5432:5432
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: o2p
      POSTGRES_USER: o2p
      POSTGRES_PASSWORD: o2p

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.ru
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

#  osm2pgsql:
#    image: iboates/osm2pgsql:latest
#    container_name: osm2pgsql
#    depends_on:
#      - postgres
#    volumes:
#      - ./import_osm.sh:/import_osm.sh  # Сценарий импорта
#      - ./osmdata:/osmdata               # Папка для данных OSM
#    environment:
#      PGHOST: postgres
#      PGUSER: o2p
#      PGPASSWORD: o2p
#      PGDATABASE: o2p
#    entrypoint: /bin/bash /import_osm.sh  # Запуск скрипта импорта

  osm2pgsql:
    build:
      context: osm2pgsql/
    command: bash -c "sleep 5; /usr/local/bin/osm-importer.sh"
    depends_on:
      - postgres
    links:
      - postgres
    environment:
      PG_PORT_5432_TCP_ADDR: postgres
      PG_PORT_5432_TCP_PORT: 5432
      PG_ENV_POSTGRES_DB: o2p
      PG_ENV_POSTGRES_USER: o2p
      PG_ENV_POSTGRES_PASSWORD: o2p
      REGION: north-america/us/delaware
#    restart: on-failure:2
    volumes:
      # Specify local directory with .pbf file
      - ./osmdata:/osm/data

volumes:
  postgres_data:

networks:
  default:
    name: osm-reader